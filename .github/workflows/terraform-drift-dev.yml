name: terraform-drift-dev

on:
  schedule:
    - cron: "0 7 * * *"   # Daily at 07:00 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  AWS_REGION: "eu-north-1"
  TF_WORKING_DIR: "infra/environments/dev"
  TF_VAR_admin_email: ${{ secrets.TF_VAR_admin_email }}

jobs:
  drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform plan (drift check)
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set +e
          terraform plan -no-color -detailed-exitcode > plan.txt 2>&1
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "Terraform plan exit code: $exit_code"
          exit 0

      - name: Upload plan output artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev
          path: ${{ env.TF_WORKING_DIR }}/plan.txt
          retention-days: 7

      - name: Create or update drift issue
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");

            const planPath = process.env.TF_WORKING_DIR + "/plan.txt";
            const planRaw = fs.readFileSync(planPath, "utf8");

            const maxLen = 60000;
            const plan = planRaw.length > maxLen
              ? planRaw.slice(0, maxLen) + "\n\n...(truncated)...\n"
              : planRaw;

            const title = "Terraform drift detected (dev)";
            const label = "terraform-drift";

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const when = new Date().toISOString();

            const bodyLines = [
              "Terraform drift detected in **dev**.",
              "",
              `- Workflow: \`${context.workflow}\``,
              `- Run: ${runUrl}`,
              `- When: ${when}`,
              "",
              "**Plan output (truncated if large):**",
              "```",
              plan,
              "```"
            ];
            const body = bodyLines.join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label
            });

            if (issues.length > 0) {
              const issue = issues[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label]
              });
            }

      - name: Fail job if drift detected
        if: steps.plan.outputs.exit_code == '2'
        run: exit 2

      - name: Fail job on plan error
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "terraform plan failed. Check plan.txt artifact for details."
          exit 1